# PatentForge — Docker Compose
#
# Usage:
#   docker compose up --build          # first run (builds all images)
#   docker compose up                  # subsequent runs
#   docker compose down                # stop all services
#   docker compose down -v             # stop and wipe database
#
# Optional: set your Anthropic API key in the environment before starting:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   docker compose up --build
#
# Or set it later via the Settings page at http://localhost:8080/settings
#
# Note: The backend uses 'prisma db push' on startup to sync the PostgreSQL schema.
# Data persists in the 'pgdata' Docker volume between restarts.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: patentforge
      POSTGRES_USER: patentforge
      POSTGRES_PASSWORD: patentforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patentforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://patentforge:patentforge@postgres:5432/patentforge
      FEASIBILITY_URL: http://feasibility:3001
      CLAIM_DRAFTER_URL: http://claim-drafter:3002
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-patentforge-internal}
      NODE_ENV: production
    restart: unless-stopped

  feasibility:
    build: ./services/feasibility
    # No external port — only reachable by backend within the Docker network
    environment:
      PORT: 3001
      NODE_ENV: production
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-patentforge-internal}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

  claim-drafter:
    build: ./services/claim-drafter
    # No external port — only reachable by backend within the Docker network
    environment:
      PORT: 3002
      HOST: "0.0.0.0"
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-patentforge-internal}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
